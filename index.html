<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RachaConta</title>
<style>
  :root{
    --bg:#0a0a0a; --card:#161616; --card2:#202020;
    --accent:#e10600; --accent2:#ff2b22; --green:#36d399; --red:#ff5c6c;
    --text:#f3f3f3; --muted:#9a9a9a; --line:#2c2c2c;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);padding:0 0 40px;line-height:1.45;}
  header{position:sticky;top:0;z-index:10;box-shadow:0 4px 16px rgba(0,0,0,.6);background:#0a0a0a;border-bottom:3px solid var(--accent);}
  header img{display:block;width:100%;max-width:560px;height:auto;margin:0 auto;}
  #fallback{display:none;background:linear-gradient(135deg,#e10600,#7a0000);padding:22px 18px 18px;}
  #fallback h1{margin:0;font-size:26px;color:#fff;font-weight:800;letter-spacing:-.5px;}
  #fallback p{margin:3px 0 0;font-size:13px;color:#ffd5d3;font-weight:600;}
  .wrap{max-width:560px;margin:0 auto;padding:16px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:16px;}
  h2{font-size:15px;text-transform:uppercase;letter-spacing:1px;color:var(--accent2);margin:0 0 12px;display:flex;align-items:center;gap:8px;}
  .ic{vertical-align:middle;border-radius:6px;object-fit:contain;flex:0 0 auto;}
  .ic.hd{width:26px;height:26px;border-radius:8px;}
  .wa{background:#25D366;color:#06310f;width:100%;margin-top:16px;display:flex;align-items:center;justify-content:center;gap:8px;}
  .wa:active{transform:scale(.97);}
  label{display:block;font-size:13px;color:var(--muted);margin:10px 0 5px;}
  input,select{width:100%;padding:13px 14px;font-size:16px;border-radius:11px;border:1px solid var(--line);background:var(--card2);color:var(--text);outline:none;}
  input:focus,select:focus{border-color:var(--accent);}
  .row{display:flex;gap:9px;}
  .row > *{flex:1;}
  button{border:none;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer;padding:13px 16px;color:#fff;background:var(--accent);transition:transform .05s;}
  button:active{transform:scale(.97);}
  button.full{width:100%;margin-top:12px;}
  button.ghost{background:transparent;color:var(--muted);border:1px solid var(--line);font-weight:600;}
  .fam{display:flex;align-items:flex-start;gap:10px;padding:12px 0;border-bottom:1px solid var(--line);}
  .fam:last-child{border-bottom:none;}
  .fam .fname{font-weight:700;font-size:15px;}
  .fam .fsub{font-size:12px;color:var(--muted);margin-top:2px;}
  .step{display:flex;align-items:center;gap:7px;margin-top:7px;}
  .step .lbl{font-size:13px;color:var(--muted);width:78px;}
  .sbtn{width:30px;height:30px;border-radius:8px;background:var(--card2);border:1px solid var(--line);color:var(--text);font-size:18px;font-weight:700;padding:0;display:flex;align-items:center;justify-content:center;}
  .scount{min-width:22px;text-align:center;font-weight:700;font-size:15px;}
  .childpct{display:flex;align-items:center;gap:8px;background:var(--card2);border:1px solid var(--line);border-radius:11px;padding:10px 12px;margin-bottom:10px;}
  .childpct label{margin:0;flex:1;color:var(--text);font-size:14px;}
  .childpct input{width:78px;text-align:center;padding:9px;}
  .x{width:26px;height:26px;border-radius:50%;background:#3a2020;color:#ff8a8a;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;border:none;padding:0;flex:0 0 auto;margin-left:auto;}
  .exp{display:flex;justify-content:space-between;align-items:flex-start;padding:11px 0;}
  .exp .who{font-size:13px;color:var(--muted);}
  .exp .out{font-size:12px;color:#ff8a8a;margin-top:2px;}
  .exp .val{font-weight:700;color:var(--accent2);white-space:nowrap;margin-left:10px;}
  .exprow{border-bottom:1px solid var(--line);}
  .exprow:last-child{border-bottom:none;}
  .adj{margin-top:5px;}
  .adj a{color:var(--accent2);font-size:12px;font-weight:700;text-decoration:none;cursor:pointer;}
  .dedit{padding:4px 0 12px;}
  .pf{display:flex;align-items:center;flex-wrap:wrap;gap:6px 12px;padding:8px 0;border-top:1px dashed var(--line);}
  .pf .pfname{font-weight:600;font-size:14px;flex-basis:100%;color:var(--text);}
  .ichip{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:8px 13px;font-size:13px;cursor:pointer;user-select:none;border:1px solid var(--line);margin:0 2px;}
  .ichip.on{background:#11301e;border-color:#1f5b3a;color:#7ef0b0;}
  .ichip.off{background:#2a1414;border-color:#5b1f1f;color:#ff9a9a;}
  .ichip.off .tx{text-decoration:line-through;opacity:.85;}
  .lk{color:var(--accent2);font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;}
  .nmrow{display:flex;align-items:center;gap:8px;margin-top:7px;}
  .nmin{flex:1;padding:9px 11px;font-size:14px;}
  .empty{color:var(--muted);font-size:14px;text-align:center;padding:14px 0;}
  .total{display:flex;justify-content:space-between;font-size:17px;font-weight:800;margin:4px 0 2px;align-items:center;}
  .total.clik{cursor:pointer;}
  .total .nm{display:flex;align-items:center;gap:7px;}
  .total .ch{color:var(--accent2);font-size:13px;width:12px;display:inline-block;}
  .who-owes{margin-top:10px;}
  .who-owes .li{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);padding:3px 0;}
  .who-owes .ow{cursor:pointer;color:var(--text);font-weight:600;padding:7px 0;align-items:center;}
  .who-owes .ow .nm{display:flex;align-items:center;gap:7px;}
  .who-owes .ow .ch{color:var(--accent2);font-size:12px;width:12px;display:inline-block;}
  .det{padding:0 0 8px 19px;}
  .det .dl{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);padding:2px 0;}
  .det .dl .cada{color:#7d7d7d;}
  .settle{background:var(--card2);border-radius:12px;padding:13px 14px;margin-top:9px;display:flex;align-items:center;gap:11px;font-size:15px;border:1px solid var(--line);}
  .settle .from{color:var(--red);font-weight:700;}
  .settle .to{color:var(--green);font-weight:700;}
  .settle .amt{margin-left:auto;font-weight:800;white-space:nowrap;}
  .arrow{color:var(--muted);}
  .ok{text-align:center;color:var(--green);font-weight:700;padding:10px 0;}
  .foot{text-align:center;color:var(--muted);font-size:12px;margin-top:20px;}
</style>
</head>
<body>
<header>
  <img src="banner.png" alt="RachaConta — Divida a vaquinha sem dor de cabeça" onerror="document.getElementById('fallback').style.display='block';this.style.display='none';">
  <div id="fallback"><h1>RachaConta</h1><p>Divida a vaquinha sem dor de cabeça</p></div>
</header>
<div class="wrap">

  <div class="card">
    <h2><img src="icon-familia.png" class="ic hd" alt="" onerror="this.replaceWith(document.createTextNode('👨‍👩‍👧'))"> Famílias / contas</h2>
    <div class="childpct">
      <label><img src="icon-crianca.png" alt="" style="width:18px;height:18px;vertical-align:middle;border-radius:5px;object-fit:contain;" onerror="this.replaceWith(document.createTextNode('🧒'))"> Cada criança paga</label>
      <input id="childpct" type="number" inputmode="numeric" min="0" max="100" value="50">
      <span style="color:var(--muted);font-size:14px;">% do adulto</span>
    </div>
    <div class="row">
      <input id="nome" placeholder="Nome da família (ex: Leandro)" autocomplete="off">
      <button onclick="addFamilia()" style="flex:0 0 auto;">Adicionar</button>
    </div>
    <div id="familias" style="margin-top:12px;"></div>
  </div>

  <div class="card">
    <h2><img src="icon-despesas.png" class="ic hd" alt="" onerror="this.replaceWith(document.createTextNode('🧾'))"> Despesas</h2>
    <label>O que foi comprado</label>
    <input id="desc" placeholder="Ex: Carne, Cerveja, Carvão..." autocomplete="off">
    <div class="row" style="margin-top:6px;">
      <div><label>Quem pagou</label><select id="pagador"></select></div>
      <div><label>Valor (R$)</label><input id="valor" type="number" inputmode="decimal" placeholder="0,00"></div>
    </div>
    <button class="full" onclick="addDespesa()">+ Lançar despesa</button>
    <div id="despesas" style="margin-top:14px;"></div>
  </div>

  <div class="card">
    <h2><img src="icon-acerto.png" class="ic hd" alt="" onerror="this.replaceWith(document.createTextNode('💸'))"> Acerto de contas</h2>
    <div id="resultado"></div>
  </div>

  <button class="ghost full" onclick="zerar()">Começar uma nova vaquinha</button>
  <p class="foot">Tudo fica salvo só no seu celular. Feito com ❤️ pelo Vida.</p>
</div>

<script>
const $ = id => document.getElementById(id);
let state = load();
let expandido = {};   // quais famílias estão abertas no acerto
let expDesp = {};     // quais despesas estão com o editor de participação aberto
let expNomes = {};    // quais famílias estão com a edição de nomes aberta
let expTotal = false; // se o detalhe do total gasto está aberto

function load(){
  let s; try{ s = JSON.parse(localStorage.getItem('rachaconta')); }catch(e){ s=null; }
  if(!s) return {familias:[],despesas:[],childPct:50,nomes:{}};
  if(typeof s.childPct!=='number') s.childPct=50;
  if(!s.nomes||typeof s.nomes!=='object') s.nomes={};
  if(Array.isArray(s.familias)){
    s.despesas=(s.despesas||[]).map(d=>({desc:d.desc,valor:d.valor,pagador:d.pagador,fora:Array.isArray(d.fora)?d.fora:[]}));
    return s;
  }
  // migra de versões antigas baseadas em "pessoas"
  const fam={};
  (s.pessoas||[]).forEach(p=>{
    if(typeof p==='string'){ fam[p]=fam[p]||{nome:p,adultos:0,criancas:0}; fam[p].adultos++; return; }
    if('titular' in p){ const t=p.titular; fam[t]=fam[t]||{nome:t,adultos:0,criancas:0}; if(p.tipo==='crianca')fam[t].criancas++; else fam[t].adultos++; return; }
    fam[p.nome]={nome:p.nome,adultos:p.adultos??1,criancas:p.criancas??0};
  });
  return {familias:Object.values(fam), despesas:[], childPct:s.childPct, nomes:{}};
}
function save(){ localStorage.setItem('rachaconta', JSON.stringify(state)); }
function brl(v){ return (v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }
function fGet(n){ return state.familias.find(f=>f.nome===n); }
function pesoDe(a,c){ return a + c*(state.childPct/100); }

function addFamilia(){
  const n=$('nome').value.trim();
  if(!n) return;
  if(fGet(n)){ alert('Já existe uma família com esse nome.'); return; }
  state.familias.push({nome:n,adultos:1,criancas:0});
  $('nome').value='';
  save(); render();
}
function removeFamilia(n){
  state.familias=state.familias.filter(f=>f.nome!==n);
  state.despesas=state.despesas.filter(d=>d.pagador!==n);
  if(state.nomes) Object.keys(state.nomes).forEach(id=>{ if(id.indexOf(n+'#')===0) delete state.nomes[id]; });
  save(); render();
}
function toggleNomes(n){ expNomes[n]=!expNomes[n]; render(); }
function setNome(id,val){
  if(!state.nomes) state.nomes={};
  if(val&&val.trim()) state.nomes[id]=val.trim(); else delete state.nomes[id];
  save(); render();
}
function incFam(n,campo,delta){
  const f=fGet(n); if(!f) return;
  if(campo==='adultos') f.adultos=Math.max(1,f.adultos+delta);
  else f.criancas=Math.max(0,f.criancas+delta);
  save(); render();
}
function setChildPct(v){ state.childPct=Math.max(0,Math.min(100,parseFloat(v)||0)); save(); render(); }

function addDespesa(){
  const desc=$('desc').value.trim()||'Despesa';
  const pagador=$('pagador').value;
  const valor=parseFloat(($('valor').value||'').replace(',','.'));
  if(!pagador){ alert('Adicione pelo menos uma família.'); return; }
  if(!valor||valor<=0){ alert('Digite um valor válido.'); return; }
  state.despesas.push({desc,pagador,valor});
  $('desc').value=''; $('valor').value='';
  save(); render();
}
function removeDespesa(i){ state.despesas.splice(i,1); delete expDesp[i]; save(); render(); }
function toggleExp(n){ expandido[n]=!expandido[n]; render(); }
function toggleTotal(){ expTotal=!expTotal; render(); }
function toggleDesp(i){ expDesp[i]=!expDesp[i]; render(); }

// indivíduos derivados da família (Adulto 1, Adulto 2, Criança 1...)
function pesoInd(tipo){ return tipo==='a' ? 1 : state.childPct/100; }
function nomeOu(id,def){ return (state.nomes&&state.nomes[id]&&state.nomes[id].trim()) ? state.nomes[id] : def; }
function individuosDe(f){
  const arr=[];
  for(let k=1;k<=f.adultos;k++){ const id=f.nome+'#a'+k, def='Adulto '+k; arr.push({id, fam:f.nome, tipo:'a', def, label:nomeOu(id,def)}); }
  for(let k=1;k<=f.criancas;k++){ const id=f.nome+'#c'+k, def='Criança '+k; arr.push({id, fam:f.nome, tipo:'c', def, label:nomeOu(id,def)}); }
  return arr;
}
function todosIndividuos(){ return state.familias.flatMap(individuosDe); }
function estaFora(d,id){ return (d.fora||[]).includes(id); }
function toggleIndDesp(i,id){
  const d=state.despesas[i]; if(!d) return;
  if(!d.fora) d.fora=[];
  if(d.fora.includes(id)) d.fora=d.fora.filter(x=>x!==id); else d.fora.push(id);
  save(); render();
}
// resumo de quem saiu da despesa, por família
function resumoPart(d){
  if(!d.fora||!d.fora.length) return [];
  const notas=[];
  state.familias.forEach(f=>{
    const ex=individuosDe(f).filter(ind=>d.fora.includes(ind.id));
    if(ex.length) notas.push(`${f.nome}: ${ex.map(e=>e.label).join(', ')} fora`);
  });
  return notas;
}
function zerar(){ if(confirm('Apagar tudo e começar uma nova vaquinha?')){ state={familias:[],despesas:[],childPct:50,nomes:{}}; expNomes={}; save(); render(); } }

function acerto(){
  const total=state.despesas.reduce((s,d)=>s+d.valor,0);
  const inds=todosIndividuos();
  const indShare={}; inds.forEach(ind=>indShare[ind.id]=0);
  const adv={}; state.familias.forEach(f=>adv[f.nome]=0);
  state.despesas.forEach(d=>{
    const incl=inds.filter(ind=>!estaFora(d,ind.id));
    const tw=incl.reduce((s,ind)=>s+pesoInd(ind.tipo),0);
    if(tw>0) incl.forEach(ind=>{ indShare[ind.id]+=d.valor*pesoInd(ind.tipo)/tw; });
    if(adv[d.pagador]!==undefined) adv[d.pagador]+=d.valor;
  });
  const share={};
  state.familias.forEach(f=>{ share[f.nome]=individuosDe(f).reduce((s,ind)=>s+(indShare[ind.id]||0),0); });
  const bal=state.familias.map(f=>({nome:f.nome,v:Math.round((adv[f.nome]-share[f.nome])*100)/100}));
  const cred=bal.filter(b=>b.v>0.009).sort((a,b)=>b.v-a.v);
  const dev=bal.filter(b=>b.v<-0.009).sort((a,b)=>a.v-b.v);
  const transf=[];let i=0,j=0;
  while(i<dev.length&&j<cred.length){
    const valor=Math.min(-dev[i].v,cred[j].v);const v=Math.round(valor*100)/100;
    if(v>0.009)transf.push({de:dev[i].nome,para:cred[j].nome,valor:v});
    dev[i].v+=valor;cred[j].v-=valor;
    if(Math.abs(dev[i].v)<0.01)i++;if(Math.abs(cred[j].v)<0.01)j++;
  }
  return {total,share,indShare,adv,transf};
}

function render(){
  // famílias
  $('familias').innerHTML = state.familias.length
    ? state.familias.map(f=>`<div class="fam"><div style="flex:1;">
        <div class="fname">${esc(f.nome)}</div>
        <div class="fsub">peso ${pesoDe(f.adultos,f.criancas).toLocaleString('pt-BR',{maximumFractionDigits:2})} cota(s)</div>
        <div class="step"><span class="lbl">Adultos</span>
          <button class="sbtn" onclick="incFam('${escJ(f.nome)}','adultos',-1)">−</button>
          <span class="scount">${f.adultos}</span>
          <button class="sbtn" onclick="incFam('${escJ(f.nome)}','adultos',1)">+</button></div>
        <div class="step"><span class="lbl">Crianças</span>
          <button class="sbtn" onclick="incFam('${escJ(f.nome)}','criancas',-1)">−</button>
          <span class="scount">${f.criancas}</span>
          <button class="sbtn" onclick="incFam('${escJ(f.nome)}','criancas',1)">+</button></div>
        ${(f.adultos+f.criancas)>0?`<div class="step" style="margin-top:9px;"><a class="lk" onclick="toggleNomes('${escJ(f.nome)}')">✏️ ${expNomes[f.nome]?'fechar nomes':'dar nome a cada um'}</a></div>`:''}
        ${expNomes[f.nome]? individuosDe(f).map(ind=>`<div class="nmrow">${ic(ind.tipo==='a'?'adulto':'crianca', ind.tipo==='a'?'👤':'🧒',18)}<input class="nmin" value="${escA(state.nomes&&state.nomes[ind.id]?state.nomes[ind.id]:'')}" placeholder="${escA(ind.def)}" onchange="setNome('${escJ(ind.id)}',this.value)"></div>`).join('') : ''}
      </div><button class="x" onclick="removeFamilia('${escJ(f.nome)}')">×</button></div>`).join('')
    : '<div class="empty">Adicione as famílias acima.</div>';

  // pagador
  const selP=$('pagador'); const pA=selP.value;
  selP.innerHTML=state.familias.map(f=>`<option value="${escA(f.nome)}">${esc(f.nome)}</option>`).join('');
  if(state.familias.some(f=>f.nome===pA)) selP.value=pA;

  // despesas
  $('despesas').innerHTML = state.despesas.length
    ? state.despesas.map((d,i)=>{
        const notas=resumoPart(d);
        const aberto=expDesp[i];
        let h=`<div class="exprow"><div class="exp"><div style="flex:1;">
          <div>${esc(d.desc)}</div>
          <div class="who">pago por ${esc(d.pagador)}</div>
          ${notas.length?`<div class="out">${notas.map(esc).join(' · ')}</div>`:''}
          <div class="adj"><a onclick="toggleDesp(${i})">${aberto?'▾ fechar':'✏️ quem dividiu'}</a></div>
        </div><div style="display:flex;align-items:center;">
          <span class="val">${brl(d.valor)}</span>
          <button class="x" style="margin-left:10px;width:22px;height:22px;font-size:14px;" onclick="removeDespesa(${i})">×</button>
        </div></div>`;
        if(aberto){
          h+='<div class="dedit">';
          if(state.familias.length){
            state.familias.forEach(f=>{
              const inds=individuosDe(f);
              if(!inds.length){ return; }
              h+=`<div class="pf"><span class="pfname">${esc(f.nome)}</span>`;
              inds.forEach(ind=>{
                const on=!estaFora(d,ind.id);
                h+=`<span class="ichip ${on?'on':'off'}" onclick="toggleIndDesp(${i},'${escJ(ind.id)}')">${on?'✓':'✕'} ${ic(ind.tipo==='a'?'adulto':'crianca', ind.tipo==='a'?'👤':'🧒',16)}<span class="tx">${esc(ind.label)}</span></span>`;
              });
              h+='</div>';
            });
          } else h+='<div class="empty" style="padding:4px 0;">Sem famílias.</div>';
          h+='</div>';
        }
        return h+'</div>';
      }).join('')
    : '<div class="empty">Lance a primeira despesa acima.</div>';

  // resultado
  const r=acerto();
  const temFam=state.familias.length>0;
  let html=`<div class="total${temFam?' clik':''}" ${temFam?'onclick="toggleTotal()"':''}><span class="nm">${temFam?`<span class="ch">${expTotal?'▾':'▸'}</span>`:''}Total gasto</span><span>${brl(r.total)}</span></div>`;
  if(temFam && expTotal){
    html+='<div class="det">';
    state.familias.forEach(f=>{ html+=`<div class="dl"><span>${esc(f.nome)} gastou</span><span>${brl(r.adv[f.nome]||0)}</span></div>`; });
    html+='</div>';
  }
  if(state.familias.length){
    html+='<div class="who-owes">';
    state.familias.forEach(f=>{
      const ex = expandido[f.nome];
      const inds = individuosDe(f);
      html+=`<div class="li ow" onclick="toggleExp('${escJ(f.nome)}')">
        <span class="nm"><span class="ch">${inds.length?(ex?'▾':'▸'):''}</span>${esc(f.nome)} deve no total</span>
        <span>${brl(r.share[f.nome]||0)}</span></div>`;
      if(ex){
        html+='<div class="det">';
        inds.forEach(ind=>{
          const foraDesc=state.despesas.filter(d=>estaFora(d,ind.id)).map(d=>d.desc);
          const foraTxt=foraDesc.length?`<span class="cada">· saiu: ${esc(foraDesc.join(', '))}</span>`:'';
          html+=`<div class="dl"><span>${ic(ind.tipo==='a'?'adulto':'crianca', ind.tipo==='a'?'👤':'🧒',18)} ${esc(ind.label)} ${foraTxt}</span><span>${brl(r.indShare[ind.id]||0)}</span></div>`;
        });
        html+='</div>';
      }
    });
    html+='</div>';
  }
  if(r.transf.length){
    html+='<div style="margin-top:14px;">';
    r.transf.forEach(t=>{ html+=`<div class="settle"><span class="from">${esc(t.de)}</span><span class="arrow">→</span><span class="to">${esc(t.para)}</span><span class="amt">${brl(t.valor)}</span></div>`; });
    html+='</div>';
  } else if(state.despesas.length){
    html+='<div class="ok">✅ Tá tudo certo, ninguém deve nada!</div>';
  }
  if(state.despesas.length){
    html+='<button class="wa" onclick="mandarWhatsApp()">'+
      '<svg width="20" height="20" viewBox="0 0 24 24" fill="#06310f"><path d="M.057 24l1.687-6.163a11.867 11.867 0 01-1.587-5.946C.16 5.335 5.495 0 12.05 0a11.817 11.817 0 018.413 3.488 11.824 11.824 0 013.48 8.414c-.003 6.557-5.338 11.892-11.893 11.892a11.9 11.9 0 01-5.688-1.448L.057 24zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884a9.86 9.86 0 001.51 5.26l-.999 3.648 3.978-1.607zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.095 3.2 5.076 4.487.709.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.695.248-1.29.173-1.414z"/></svg>'+
      'Mandar resumo no WhatsApp</button>';
  }
  $('resultado').innerHTML=html;
}
function mandarWhatsApp(){
  if(!state.despesas.length){ alert('Lance ao menos uma despesa.'); return; }
  const r=acerto();
  let t='🔴⚫ *RachaConta* — divisão do rolê\n\n';
  t+='💰 Total: '+brl(r.total)+'\n\n';
  if(r.transf.length){
    t+='*Quem paga pra quem:*\n';
    r.transf.forEach(x=>{ t+='• '+x.de+' ➜ '+x.para+': *'+brl(x.valor)+'*\n'; });
  } else {
    t+='✅ Tá tudo certo, ninguém deve nada!\n';
  }
  if(state.familias.length){
    t+='\n*Consumo por família:*\n';
    state.familias.forEach(f=>{ t+='• '+f.nome+': '+brl(r.share[f.nome]||0)+'\n'; });
  }
  t+='\n_feito no RachaConta_';
  window.open('https://wa.me/?text='+encodeURIComponent(t),'_blank');
}

function ic(name,emoji,size){ return `<img src="icon-${name}.png" alt="" style="width:${size}px;height:${size}px;vertical-align:middle;border-radius:5px;object-fit:contain;" onerror="this.replaceWith(document.createTextNode('${emoji}'))">`; }
function esc(s){ return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function escA(s){ return String(s).replace(/"/g,'&quot;'); }
function escJ(s){ return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

$('nome').addEventListener('keydown',e=>{ if(e.key==='Enter') addFamilia(); });
$('valor').addEventListener('keydown',e=>{ if(e.key==='Enter') addDespesa(); });
$('childpct').addEventListener('input',e=>setChildPct(e.target.value));
$('childpct').value=state.childPct;
render();
</script>
</body>
